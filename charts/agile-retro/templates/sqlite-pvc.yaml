{{- if and .Values.sqlite.enabled .Values.sqlite.persistence.enabled (not .Values.sqlite.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agile-retro.fullname" . }}-sqlite
  labels:
    {{- include "agile-retro.labels" . | nindent 4 }}
    app.kubernetes.io/component: sqlite
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.sqlite.persistence.size | quote }}
  {{- if .Values.sqlite.persistence.storageClassName }}
  storageClassName: {{ .Values.sqlite.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
