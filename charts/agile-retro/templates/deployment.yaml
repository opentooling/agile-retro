apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agile-retro.fullname" . }}
  labels:
    {{- include "agile-retro.labels" . | nindent 4 }}
spec:
  {{- if .Values.sqlite.enabled }}
  # SQLite is a single-writer file DB — never run more than one replica, and use
  # Recreate so the old pod releases the RWO volume before the new one mounts it.
  replicas: 1
  strategy:
    type: Recreate
  {{- else if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agile-retro.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "agile-retro.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agile-retro.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The Postgres schema is created automatically on first connection by
          # src/lib/db.ts, so no migration step is required at startup.
          command: ["/bin/sh", "-c"]
          args:
            - |
              npm start
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if .Values.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.envFromSecret }}
          {{- end }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            # Database connection. src/lib/db.ts picks the backend from the scheme.
            - name: DATABASE_URL
              {{- if .Values.sqlite.enabled }}
              value: "file:{{ .Values.sqlite.mountPath }}/{{ .Values.sqlite.fileName }}"
              {{- else if .Values.postgresql.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "agile-retro.fullname" . }}-postgres
                  key: database-url
              {{- else if .Values.externalDatabase.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.existingSecretKey | default "database-url" }}
              {{- else }}
              value: {{ required "Set sqlite.enabled=true, or postgresql.enabled=true, or provide externalDatabase.url / externalDatabase.existingSecret" .Values.externalDatabase.url | quote }}
              {{- end }}
            {{- if .Values.app.url }}
            # Public URL of the app, so Auth.js builds correct OAuth redirect URIs
            # (e.g. <app.url>/api/auth/callback/keycloak) behind a proxy/route.
            - name: AUTH_URL
              value: {{ .Values.app.url | quote }}
            {{- end }}
            {{- if .Values.app.trustHost }}
            # Trust X-Forwarded-Proto/Host from the ingress/route (TLS terminated upstream).
            - name: AUTH_TRUST_HOST
              value: "true"
            {{- end }}
            {{- if or .Values.auth.secret .Values.auth.existingSecret }}
            - name: AUTH_SECRET
              {{- if .Values.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.existingSecretKey | default "auth-secret" }}
              {{- else }}
              value: {{ .Values.auth.secret | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.auth.google.enabled }}
            - name: AUTH_GOOGLE_ID
              value: {{ .Values.auth.google.clientId | quote }}
            - name: AUTH_GOOGLE_SECRET
              {{- if .Values.auth.google.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.google.existingSecret }}
                  key: {{ .Values.auth.google.existingSecretKey | default "google-client-secret" }}
              {{- else }}
              value: {{ .Values.auth.google.clientSecret | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.auth.keycloak.enabled }}
            - name: AUTH_KEYCLOAK_ID
              value: {{ .Values.auth.keycloak.clientId | quote }}
            - name: AUTH_KEYCLOAK_SECRET
              {{- if .Values.auth.keycloak.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.keycloak.existingSecret }}
                  key: {{ .Values.auth.keycloak.existingSecretKey | default "keycloak-client-secret" }}
              {{- else }}
              value: {{ .Values.auth.keycloak.clientSecret | quote }}
              {{- end }}
            - name: AUTH_KEYCLOAK_ISSUER
              value: {{ .Values.auth.keycloak.issuer | quote }}
            {{- if .Values.auth.keycloak.adminClientId }}
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: {{ .Values.auth.keycloak.adminClientId | quote }}
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              {{- if .Values.auth.keycloak.adminExistingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.keycloak.adminExistingSecret }}
                  key: {{ .Values.auth.keycloak.adminExistingSecretKey | default "keycloak-admin-client-secret" }}
              {{- else }}
              value: {{ .Values.auth.keycloak.adminClientSecret | quote }}
              {{- end }}
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.sqlite.enabled }}
          volumeMounts:
            - name: sqlite-data
              mountPath: {{ .Values.sqlite.mountPath | quote }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.sqlite.enabled }}
      volumes:
        - name: sqlite-data
        {{- if .Values.sqlite.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.sqlite.persistence.existingClaim | default (printf "%s-sqlite" (include "agile-retro.fullname" .)) }}
        {{- else }}
          emptyDir: {}
        {{- end }}
      {{- end }}
