{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agile-retro.fullname" . }}-postgres
  labels:
    {{- include "agile-retro.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  postgres-user: {{ .Values.postgresql.auth.username | quote }}
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  postgres-database: {{ .Values.postgresql.auth.database | quote }}
  # Connection string the app reads as DATABASE_URL.
  database-url: "postgres://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "agile-retro.fullname" . }}-postgres:5432/{{ .Values.postgresql.auth.database }}"
{{- end }}
