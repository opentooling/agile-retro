replicaCount: 1

image:
  repository: agile-retro
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true# Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}

  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# File-based SQLite (node:sqlite) — a single-replica fallback that needs no DB
# container, just a small PVC for the database file. When enabled it takes
# precedence: the bundled Postgres is not deployed and externalDatabase is ignored.
sqlite:
  enabled: false
  mountPath: /data          # PVC is mounted here; the DB file lives in it
  fileName: dev.db
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""    # "" = cluster default
    existingClaim: ""

# Bundled PostgreSQL (runs as a separate container/Deployment in this release).
postgresql:
  enabled: true
  image: postgres:16-alpine   # airgapped: point at your mirror or a RHEL postgresql image
  imagePullPolicy: IfNotPresent
  auth:
    username: agile
    password: change-me-in-production
    database: agile_retro
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: ""      # "" = cluster default
    existingClaim: ""
  # OpenShift note: the community `postgres` image does NOT run under the default
  # restricted SCC (it needs a fixed UID). To run it here either:
  #   - set a podSecurityContext below (e.g. fsGroup/runAsUser), or
  #   - grant the postgres ServiceAccount the 'anyuid' SCC, or
  #   - switch `image` to a RHEL postgresql image (and adjust env var names).
  podSecurityContext: {}
  resources: {}

# Used only when postgresql.enabled is false — point the app at an external DB.
externalDatabase:
  url: ""                     # postgres://user:pass@host:5432/dbname
  existingSecret: ""          # name of a Secret containing the connection string
  existingSecretKey: "database-url"

# Public-facing app configuration for Auth.js (NextAuth).
app:
  # Full public URL the app is served from (scheme + host, NO trailing slash).
  # Auth.js uses this to build OAuth redirect URIs that match what you register
  # in your IdP, e.g. <app.url>/api/auth/callback/keycloak.
  # Leave empty only for local/dev where the host can be safely inferred.
  url: ""  # e.g. https://agile-retro.apps.example.com
  # Trust X-Forwarded-Proto/Host from the ingress/route (TLS terminated upstream).
  # Required in most cluster deployments behind a proxy. Sets AUTH_TRUST_HOST=true.
  trustHost: true

env:
  # Define extra environment variables here. DATABASE_URL is injected
  # automatically from the bundled Postgres secret (or externalDatabase).
  []

envFromSecret: ""
# envFromSecret: "my-app-secret"

auth:
  secret: "change-me-in-production" # AUTH_SECRET
  existingSecret: "" # Optional: Name of existing secret for AUTH_SECRET
  existingSecretKey: "auth-secret" # Key in the existing secret

  google:
    enabled: false
    clientId: ""
    clientSecret: ""
    existingSecret: "" # Optional: Name of existing secret for clientSecret
    existingSecretKey: "google-client-secret" # Key in the existing secret

  keycloak:
    enabled: false
    clientId: ""
    clientSecret: ""
    issuer: ""
    existingSecret: "" # Optional: Name of existing secret for clientSecret
    existingSecretKey: "keycloak-client-secret" # Key in the existing secret

openshift:
  route:
    enabled: true
    host: "" # Leave empty to auto-generate if supported, or specify host

